# Default traffic class on WAN4 (SL4) — web, HTTPS, APIs
# Binds to WAN4, connects to multi-conn server port 45014
role: client
bind_ip: if:enp7s6
remote_addr: VPS_PUBLIC_IP
remote_port: 45014
tun_name: df4
tun_cidr: 10.200.14.9/24
metrics_listen: auto
log_level: info
tls_ca_file: /etc/mpquic/tls/ca.crt
tls_server_name: mpquic-server
tls_insecure_skip_verify: false
