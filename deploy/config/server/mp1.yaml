# Multipath stripe server — dual Starlink bonding
# Accepts multi-conn QUIC + stripe UDP on port 46017
role: server
bind_ip: 0.0.0.0
remote_port: 45017
multi_conn_enabled: true
stripe_enabled: true
stripe_port: 46017
stripe_data_shards: 10
stripe_parity_shards: 2
stripe_fec_mode: adaptive
stripe_fec_type: rs
stripe_fec_window: 10
stripe_arq: true
tun_name: mp1
tun_cidr: 10.200.17.254/24
metrics_listen: auto
log_level: info
tls_cert_file: /etc/mpquic/tls/server.crt
tls_key_file: /etc/mpquic/tls/server.key
